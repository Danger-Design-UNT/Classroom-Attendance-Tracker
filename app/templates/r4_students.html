<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Students – {{ clazz.name }}</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            padding: 24px;
        }
        h1 { margin-bottom: 12px; }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 16px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        th { background: #f3f3f3; }
        tr:nth-child(even) { background: #fafafa; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/r4.css') }}">
</head>
<body>

<h1>Students for {{ clazz.name }}</h1>

<h2>Upload Class Roster (PDF)</h2>

<form
    action="{{ url_for('r4.upload_roster', class_id=clazz.id) }}"
    method="POST"
    enctype="multipart/form-data"
>
    <input type="file" name="roster_pdf" accept="application/pdf" required>
    <button type="submit">Upload Roster</button>
</form>

{% if students %}
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
        </tr>
    </thead>
    <tbody>
        {% for s in students %}
        <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.email }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No students enrolled yet.</p>
{% endif %}
 <a href="{{ url_for('attendance.teacher_dashboard') }}" class="return">
    ← Return to Dashboard
</a>
</body>
</html>
