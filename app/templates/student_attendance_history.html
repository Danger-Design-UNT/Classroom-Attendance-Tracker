<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student_attendance_history.css') }}">
</head>
<body>
    <div class="container">
        <div class="attendance-header">Attendance History</div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Class</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for record in records %}
                    <tr>
                        <td>{{ record.class_.class_name }} - {{ record.class_.class_section }}</td>
                        <td class="timestamp" data-utc="{{ record.timestamp.strftime('%Y-%m-%dT%H:%M:%S') }}Z"></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="2">No attendance records yet.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <a href="{{ url_for('attendance.student_dashboard') }}" class="return">Return to dashboard</a>
    </div>
    <script>
        document.querySelectorAll('.timestamp').forEach(el => {
            const utc = new Date(el.dataset.utc);
            el.textContent = utc.toLocaleString();
        });
    </script>
</body>
</html>
