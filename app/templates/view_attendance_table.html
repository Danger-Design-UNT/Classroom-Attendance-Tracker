<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Table</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/view_attendance_table.css') }}">
</head>
<body>
    <div class="container">
        <h1>Attendance Table</h1>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Email</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for record in records %}
                    <tr>
                        <td>{{ record.student.name }}</td>
                        <td>{{ record.student.email }}</td>
                        <td class="timestamp" data-utc="{{ record.timestamp.strftime('%Y-%m-%dT%H:%M:%S') }}Z"></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="3">No attendance records yet.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <form action="{{ url_for('attendance.teacher_dashboard') }}" method="get">
            <button class="create-class">Return to Dashboard</button>
        </form>
    </div>
    <script>
        document.querySelectorAll('.timestamp').forEach(el => {
            const utc = new Date(el.dataset.utc);
            el.textContent = utc.toLocaleString();
        });
    </script>
</body>
</html>
